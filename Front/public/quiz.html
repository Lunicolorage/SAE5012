  <script>
    document.querySelector('a-scene').addEventListener('loaded', function () {
 
    const questions = [
      {
        question: "Les chauves-souris sont aveugles",
        correct: "faux",
        reponse : "Les chauves-souris ne sont pas aveugles. Elles utilisent l'echolocation pour se reperer dans l'obscurite, mais elles ont aussi des yeux fonctionnels."
      },
      {
        question: "Les flamants roses naissent roses",
        correct: "faux",
        reponse : "Les flamants roses naissent gris ou blancs. Leur couleur rose provient des pigments contenus dans les crevettes et les algues qu'ils consomment."
      },
      {
        question: "Les cameleons changent de couleurs principalement pour communiquer",
        correct: "vrai",
        reponse : "En effet l'idee recue est que les cameleons changent de couleur pour se camoufler, mais ils le font surtout pour communiquer leurs emotions et intentions aux autres cameleons."
      },
      {
        question: "Le poulpe possede 2 coeurs",
        correct: "faux",
        reponse : "Le poulpe possede en realite 3 coeurs : deux coeurs branchiaux qui pompent le sang vers les branchies, et un coeur systémique qui pompe le sang vers le reste du corps."
      },
      {
        question: "Le poules mangent des pierres pour aider a la digestion",
        correct: "vrai",
        reponse : "Les poules avalent des petites pierres ou du gravier, qui se logent dans leur gesier et aident a broyer les aliments pour faciliter la digestion."
      }
    ];

    let boutonChange = document.querySelector('#boutonChange')
    boutonChange.addEventListener('click', function (evtBtn) {
        window.parent.postMessage({ action: 'navigateToIndex' }, '*');
    })
    

    let pos = 0;
    let questionText = document.querySelector('#question');
    let questionBg = document.querySelector('#questionBg');

    function loadQuestion(questionText, pos) {
      let currentQuestion = questions[pos];
      questionText.setAttribute('text', 'value: ' + currentQuestion.question + '; width: 7; wrapCount: 25; align: center; baseline: center; color: black; font: mozillavr');
    }
    loadQuestion(questionText, pos);

    let buzzDroit = document.querySelector('#buzzd');
    let buzzGauche = document.querySelector('#buzzg');
    let buzz = document.querySelectorAll(".buzz");

    let soundBuzzClick = document.getElementById("buzzClick");
    let soundLose = document.getElementById("loseSound");
    let soundWin = document.getElementById("winSound");
    let soundVictory = document.getElementById("victorySound");

    let lampCadre = document.querySelectorAll(".lamp");
    
    buzz.forEach(buzzer => {
        buzzer.addEventListener('click', function (evt) {
           soundBuzzClick.play();

          var selectedAnswer = buzzer.id === "buzzd" ? "faux" : "vrai";
          if (selectedAnswer === questions[pos].correct) {
            soundWin.play();
            lampCadre.forEach(lamp =>{
              lamp.setAttribute('animation__mat',
                  'property: material.color; to: #008000; dur: 200; easing: easeInOutQuad'
                );
                lamp.setAttribute('animation__emi',
                  'property: material.emissive; to: #008000; dur: 200; easing: easeInOutQuad'
                );
                lamp.setAttribute('animation__light',
                  'property: light.color; to: #008000; dur: 200; easing: easeInOutQuad'
                );
            })
            questionBg.setAttribute('material', 'color: green; emissive: green; emissiveIntensity: 1; shader: standard');
              setTimeout(function () {
                questionBg.setAttribute('material', 'color: white; emissive: white; emissiveIntensity: 1; shader: standard');
              }, 100);
            console.log("Correct! " + questions[pos].reponse);
            pos++;
            if (pos >= questions.length) {
              soundVictory.play();
              questionText.setAttribute('text', 'value: Bravo ! Vous avez repondu a toutes les questions.; width: 7; wrapCount: 25; align: center; baseline: center; color: green; font: mozillavr');
              var confetti = document.querySelector('#conf');
              confetti.setAttribute('visible', 'true');
              setTimeout(() => {
                lampCadre.forEach(lamp => {
                  lamp.setAttribute('animation__mat',
                    'property: material.color; to: #FFE95C; dur: 200; easing: easeInOutQuad'
                  );
                  lamp.setAttribute('animation__emi',
                    'property: material.emissive; to: #FFE95C; dur: 200; easing: easeInOutQuad'
                  );
                  lamp.setAttribute('animation__light',
                    'property: light.color; to: #FFE95C; dur: 200; easing: easeInOutQuad'
                  );
                });
              }, 1000);
            } else {
              loadQuestion(questionText, pos);
            }
          } else {
            soundLose.play();
            lampCadre.forEach(lamp =>{
              lamp.setAttribute('animation__mat',
                  'property: material.color; to: #FF0000; dur: 200; easing: easeInOutQuad'
                );
                lamp.setAttribute('animation__emi',
                  'property: material.emissive; to: #FF0000; dur: 200; easing: easeInOutQuad'
                );
                lamp.setAttribute('animation__light',
                  'property: light.color; to: #FF0000; dur: 200; easing: easeInOutQuad'
                );
              })
             questionBg.setAttribute('material', 'color: red; emissive: red; emissiveIntensity: 1; shader: standard');
              setTimeout(function () {
                questionBg.setAttribute('material', 'color: white; emissive: white; emissiveIntensity: 1; shader: standard');
              }, 100);
            // console.log("Incorrect! " + questions[pos].reponse);
            questionText.setAttribute('text', 'value: Perdu ! ' + questions[pos].reponse + '; width: 7; wrapCount: 25; align: center; baseline: center; color: red; font: mozillavr');
            
          }
      });
    });
    

});
