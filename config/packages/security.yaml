security:
    enable_authenticator_manager: true
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
        
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
    
    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify, roles: PUBLIC_ACCESS }
        - { path: ^/api/articles$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/articles/.*?/full$, roles: PUBLIC_ACCESS }

        - { path: ^/api/articles/import$, roles: PUBLIC_ACCESS, methods: [POST] }
        
        - { path: ^/api/images, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/jeu_donnees, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/notes, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/sections, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/textes, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/titres, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/users, roles: ['ROLE_ADMIN'] }
        - { path: ^/api/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10